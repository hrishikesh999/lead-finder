name: Run Prospect Qualifier

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: "Rows to sample from the CSVs (default: 500)"
        required: false
        default: "500"
        type: string
      include_org:
        description: "Include .org domains (excluded by default)"
        required: false
        default: false
        type: boolean

# Prerequisites before triggering this workflow:
#   1. Drop activecampaign.csv and/or keap.csv into the input/ folder
#   2. git add input/*.csv && git commit && git push
#   3. Trigger this workflow from the Actions tab

jobs:
  qualify-prospects:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Run prospect qualifier
        run: |
          uv run python qualify.py \
            --sample-size ${{ inputs.sample_size }} \
            ${{ inputs.include_org == 'true' && '--include-org' || '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEETS_CREDENTIALS_JSON: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS_JSON }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
